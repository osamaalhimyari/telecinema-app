name: watch_aprty_app
description: "Watch Party — synchronized video rooms, chat, reactions and voice."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

# Dependency versions mirror the rider_app_flutter reference where they
# overlap, so both apps share one known-good resolution.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ---- State management / DI / functional core ----
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^11.0.0
  equatable: ^2.0.8
  dartz: ^0.10.1
  get_it: ^9.2.1

  # ---- Routing ----
  go_router: ^17.2.2

  # ---- Network / realtime ----
  dio: ^5.9.2
  http: ^1.2.0 # fetch subtitle (.srt/.vtt) text for the embed overlay
  socket_io_client: ^3.1.2 # Socket.IO v4 protocol (matches backend socket.io ^4)

  # ---- Media ----
  media_kit: ^1.2.6 # libmpv-backed player for file rooms: faster start + caching
  media_kit_video: ^2.0.1 # the Video render widget
  media_kit_libs_video: ^1.0.7 # bundled native libs (Android/iOS/web/desktop)
  webview_flutter: ^4.10.0 # external (embed) rooms render inside a WebView
  flutter_svg: ^2.0.10 # seeded room thumbnails are SVG
  image_picker: ^1.1.2 # pick a local video for the upload flow
  file_picker: ^8.1.4 # pick an .srt/.vtt subtitle file for embed rooms

  # ---- Push-to-talk voice (mobile↔mobile burst relay over the socket) ----
  # 6.x keeps the same AudioRecorder API as 5.x but ships a consistent set of
  # federated platform impls. (5.x let record_platform_interface float up to
  # 1.6.0, which the stale record_linux 0.7.2 couldn't satisfy — breaking the
  # kernel snapshot on every platform, including Android.)
  record: ^6.2.1
  just_audio: ^0.9.42

  # ---- Storage / platform ----
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  simple_pip_mode: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.8.0

flutter:
  uses-material-design: true

# Launcher icons — sources live in assets/icon/ (generated by tool/gen_icon.dart).
# Regenerate platform icons with: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#0D9488"
  adaptive_icon_foreground: "assets/icon/foreground.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#0B0D11"
    theme_color: "#14B8A6"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
