[package]
name = "rust_lib_watch_aprty_app"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
flutter_rust_bridge = "=2.12.0"
anyhow = "1"
futures = "0.3"
tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "macros", "time"] }
# librqbit derives Deserialize on Option<Arc<str>>; serde's `rc` feature
# (normally pulled by librqbit's default features, which we disabled) provides
# the Arc/Rc Serialize/Deserialize impls. Enabled here graph-wide.
serde = { version = "1", features = ["rc"] }

# Embedded BitTorrent engine. default-features disabled to drop the
# native-tls/openssl backend (does not cross-compile cleanly to Android);
# `rust-tls` swaps in rustls + ring, and `http-api` enables the built-in
# axum server that exposes GET /torrents/{id}/stream/{file} with Range support.
[dependencies.librqbit]
version = "8.1.1"
default-features = false
features = ["http-api", "rust-tls", "tracing-subscriber-utils"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
